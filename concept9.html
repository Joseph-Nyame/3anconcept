<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept 9 - Glassmorphic Dark</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Abstract blurred shapes */
        .shape-1, .shape-2 {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.5;
            animation: float 20s infinite alternate;
        }
        
        .shape-1 {
            width: 500px;
            height: 500px;
            background: #38bdf8;
            top: -100px;
            right: -100px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #818cf8;
            bottom: -50px;
            left: -100px;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-100px, 100px) scale(1.1); }
        }

        nav {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(9, 9, 11, 0.4);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        
        .nav-links { display: flex; gap: 3rem; list-style: none; margin: 0; padding: 0; }
        .nav-links li a { color: var(--text); text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        .nav-links li a:hover { color: var(--accent); }

        .hero {
            padding: 12rem 5% 5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 4rem;
            backdrop-filter: blur(16px);
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 5rem;
            line-height: 1.1;
            margin: 0 0 1.5rem 0;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.lead {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-btn {
            background: white;
            color: black;
            padding: 1rem 3rem;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            display: inline-block;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .featured-car {
            margin-top: 4rem;
            width: 100%;
            max-width: 1000px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .featured-car img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="shape-1"></div>
    <div class="shape-2"></div>
    
    <nav>
        <div class="logo">AERO<span>DRIVE</span></div>
        <ul class="nav-links">
            <li><a href="#">Vehicles</a></li>
            <li><a href="#">Expeditions</a></li>
            <li><a href="#">Membership</a></li>
        </ul>
        <a href="#" class="cta-btn" style="padding: 0.5rem 1.5rem; font-size: 0.9rem;">Sign In</a>
    </nav>

    <div class="hero">
        <div class="glass-card">
            <h1>Drive the Future.</h1>
            <p class="lead">Experience the world's most advanced luxury vehicles, available on demand with zero compromise.</p>
            <a href="#" class="cta-btn">Book Now</a>
        </div>
        
        <div class="featured-car">
            <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?w=1600&h=800&fit=crop" alt="Luxury Car">
        </div>
    </div>
</body>
</html>

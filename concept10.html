<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept 10 - Luxe Minimalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7;
            --text: #2c2c2c;
            --accent: #d4af37;
            --border: #e8e4dc;
        }

        body {
            margin: 0;
            font-family: 'Lato', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            padding: 3rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-style: italic;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 4rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 3px;
        }

        .hero {
            display: flex;
            min-height: calc(100vh - 120px);
        }

        .hero-text {
            flex: 1;
            padding: 10% 8%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .hero-text::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 0;
            width: 1px;
            height: 60%;
            background: var(--accent);
        }

        .subtitle {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            line-height: 1.1;
            margin: 0 0 2rem 0;
            font-weight: 400;
        }

        .hero-img {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=1200&h=1600&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .btn {
            display: inline-block;
            border: 1px solid var(--text);
            padding: 1rem 3rem;
            text-decoration: none;
            color: var(--text);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.4s;
            align-self: flex-start;
        }

        .btn:hover {
            background: var(--text);
            color: var(--bg);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Maison Auto</div>
        <div class="nav-links">
            <a href="#">Collection</a>
            <a href="#">Services</a>
            <a href="#">Journal</a>
        </div>
    </header>

    <div class="hero">
        <div class="hero-text">
            <span class="subtitle">The Art of Travel</span>
            <h1>Elegance<br>in Motion.</h1>
            <p style="max-width: 400px; margin-bottom: 3rem; font-weight: 300;">
                Curated European imports available for private acquisition and exclusive short-term lease. Experience unparalleled craftsmanship.
            </p>
            <a href="#" class="btn">View Collection</a>
        </div>
        <div class="hero-img"></div>
    </div>
</body>
</html>
